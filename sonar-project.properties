sonar.projectKey=tsopany_directus_extension_geo
sonar.projectName=Directus Extension Geo
sonar.host.url=https://sonar.tsopany.com

# 1. Define both source folders
sonar.sources=src

# 2. Define test locations (if they are inside the src folders, use inclusions)
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.js

# 3. Import both coverage reports
# Note: Ensure your test scripts generate these exact files
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# 4. Exclusions to keep the report clean
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.config.js,**/*.config.ts